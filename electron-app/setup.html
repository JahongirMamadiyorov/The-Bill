<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://the-bill-backend.onrender.com;" />
  <title>The Bill — Setup</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* Drag region so frameless window is moveable */
    body {
      -webkit-app-region: drag;
    }

    /* Inputs/buttons must be non-draggable */
    input, button, a {
      -webkit-app-region: no-drag;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 24px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    /* Logo / title */
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: #fff;
    }

    .logo h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #f1f5f9;
      text-transform: uppercase;
    }

    .logo p {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }

    /* Form */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #94a3b8;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input::placeholder {
      color: #475569;
    }

    input:focus {
      border-color: #0891b2;
      box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.2);
    }

    /* Error message */
    .error-msg {
      display: none;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fca5a5;
      font-size: 0.82rem;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .error-msg.visible {
      display: block;
    }

    /* Button */
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    button:hover:not(:disabled) {
      opacity: 0.92;
    }

    button:active:not(:disabled) {
      transform: scale(0.99);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* Spinner inside button */
    .btn-text { display: inline; }
    .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    button.loading .btn-text   { display: none; }
    button.loading .btn-spinner { display: block; }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.72rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">

      <div class="logo">
        <div class="logo-icon">
          <!-- Receipt / bill icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 3H5C3.9 3 3 3.9 3 5v14l4-2 4 2 4-2 4 2V5c0-1.1-.9-2-2-2zM17 13H7v-2h10v2zm0-4H7V7h10v2z"/>
          </svg>
        </div>
        <h1>The Bill</h1>
        <p>Kitchen Print Agent Setup</p>
      </div>

      <form id="setupForm" autocomplete="off">
        <div class="form-group">
          <label for="identifier">Email or Phone</label>
          <input
            type="text"
            id="identifier"
            name="identifier"
            placeholder="admin@restaurant.com"
            autocomplete="off"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="error-msg" id="errorMsg">
          Login failed. Check your credentials.
        </div>

        <button type="submit" id="connectBtn">
          <span class="btn-text">Connect</span>
          <div class="btn-spinner"></div>
        </button>
      </form>

      <div class="footer">
        Connecting to the-bill-backend.onrender.com
      </div>

    </div>
  </div>

  <script>
    const form       = document.getElementById('setupForm');
    const errorMsg   = document.getElementById('errorMsg');
    const connectBtn = document.getElementById('connectBtn');

    function setLoading(loading) {
      connectBtn.disabled = loading;
      connectBtn.classList.toggle('loading', loading);
    }

    function showError(msg) {
      errorMsg.textContent = msg || 'Login failed. Check your credentials.';
      errorMsg.classList.add('visible');
    }

    function clearError() {
      errorMsg.classList.remove('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const identifier = document.getElementById('identifier').value.trim();
      const password   = document.getElementById('password').value;

      if (!identifier || !password) {
        showError('Please enter your email/phone and password.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('https://the-bill-backend.onrender.com/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ identifier, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login failed. Check your credentials.');
          setLoading(false);
          return;
        }

        // Success — save credentials via Electron IPC and open main window
        if (window.electronAPI && window.electronAPI.saveCredentials) {
          await window.electronAPI.saveCredentials({ identifier, password });
        }
        // main.js will close this window and open the main window

      } catch (err) {
        showError('Cannot connect to server. Check your internet connection.');
        setLoading(false);
      }
    });

    // Auto-focus identifier field on load
    document.getElementById('identifier').focus();
  </script>
</body>
</html>
