<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Bill</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      overflow: hidden;
    }

    .center {
      text-align: center;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #0891b2;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* Animated dot bar */
    .dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #0891b2;
      opacity: 0.3;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.9); }
      40%            { opacity: 1;    transform: scale(1.1); }
    }

    .label {
      margin-top: 14px;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      color: #475569;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="logo">The Bill</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="label">Connecting...</div>
  </div>
</body>
</html>
